<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Emendas · João Daniel PT/SE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,#cc0000,#990000);padding:16px 16px 12px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hdr-star{width:32px;height:32px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-name{color:#fff;font-size:14px;font-weight:600;line-height:1.2}
.hdr-sub{color:rgba(255,255,255,0.75);font-size:11px}
.hdr-refresh{margin-left:auto;background:rgba(255,255,255,0.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* BUSCA */
.search-wrap{background:#fff;border-radius:10px;display:flex;align-items:center;padding:0 10px;gap:8px}
.search-wrap input{flex:1;border:none;outline:none;font-size:14px;padding:10px 0;background:transparent;color:#1c1c1e}
.search-icon{color:#999;font-size:14px}

/* TOTAIS GERAIS */
.totais{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px 0}
.total-card{background:#fff;border-radius:12px;padding:12px 14px;border-left:3px solid #cc0000}
.total-label{font-size:10px;color:#888;margin-bottom:2px;text-transform:uppercase;letter-spacing:.03em}
.total-value{font-size:16px;font-weight:700;color:#1c1c1e}
.total-value.red{color:#cc0000}
.exec-bar{margin-top:6px;height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden}
.exec-fill{height:100%;background:#cc0000;border-radius:2px;transition:width .5s}
.exec-pct{font-size:10px;color:#cc0000;margin-top:3px;font-weight:600}

/* ABAS */
.tabs{display:flex;padding:12px 16px 0;gap:8px}
.tab{flex:1;padding:8px;background:#fff;border:none;border-radius:10px;font-size:12px;font-weight:500;color:#888;cursor:pointer;transition:all .2s}
.tab.active{background:#cc0000;color:#fff}

/* LISTA MUNICÍPIOS */
.section-title{padding:12px 16px 6px;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em}
.mun-list{padding:0 16px 80px}
.mun-card{background:#fff;border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:transform .1s}
.mun-card:active{transform:scale(0.98)}
.mun-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.mun-nome{font-size:14px;font-weight:600;color:#1c1c1e}
.mun-qtd{font-size:11px;color:#888;margin-top:1px}
.mun-chevron{color:#ccc;font-size:16px}
.mun-valores{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #f2f2f7}
.mun-val{padding:8px 14px}
.mun-val-label{font-size:10px;color:#888;margin-bottom:1px}
.mun-val-num{font-size:13px;font-weight:600;color:#1c1c1e}
.mun-val-num.red{color:#cc0000}
.mun-bar{height:3px;background:#f0f0f0;margin:0 14px 10px;border-radius:2px;overflow:hidden}
.mun-bar-fill{height:100%;background:#cc0000;border-radius:2px}

/* DETALHE MUNICÍPIO */
.detalhe{display:none;padding:0 16px 80px}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:#cc0000;font-size:14px;font-weight:500;cursor:pointer;padding:12px 0}
.detalhe-nome{font-size:20px;font-weight:700;color:#1c1c1e;margin-bottom:12px}
.detalhe-totais{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.dt{background:#fff;border-radius:10px;padding:10px 12px;text-align:center}
.dt-label{font-size:10px;color:#888;margin-bottom:3px}
.dt-value{font-size:13px;font-weight:700;color:#1c1c1e}
.dt-value.red{color:#cc0000}
.emenda-item{background:#fff;border-radius:10px;margin-bottom:8px;padding:12px 14px}
.emenda-objeto{font-size:13px;font-weight:500;color:#1c1c1e;margin-bottom:8px;line-height:1.4}
.emenda-row{display:flex;justify-content:space-between;margin-bottom:4px}
.emenda-label{font-size:11px;color:#888}
.emenda-val{font-size:11px;font-weight:600;color:#1c1c1e}
.emenda-val.red{color:#cc0000}
.emenda-sit{margin-top:6px}
.pill{display:inline-block;font-size:10px;padding:3px 8px;border-radius:999px}
.s-ok{background:#eaf3de;color:#3b6d11}
.s-info{background:#e6f1fb;color:#185fa5}
.s-err{background:#fcebeb;color:#a32d2d}
.s-warn{background:#faeeda;color:#854f0b}
.s-gray{background:#f0f0f0;color:#666}

/* RESUMO GERAL */
.resumo{display:none;padding:0 16px 80px}
.resumo-card{background:#fff;border-radius:12px;margin-bottom:8px;padding:14px}
.resumo-titulo{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.resumo-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f2f2f7}
.resumo-item:last-child{border-bottom:none}
.resumo-item-nome{font-size:13px;color:#1c1c1e}
.resumo-item-val{font-size:13px;font-weight:600;color:#cc0000}

/* LOADING */
.loading{padding:60px 20px;text-align:center;color:#888;font-size:14px}
.loading-spinner{width:32px;height:32px;border:3px solid #eee;border-top:3px solid #cc0000;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.erro{margin:16px;padding:14px;background:#fcebeb;border-radius:10px;color:#a32d2d;font-size:13px;line-height:1.6}
.erro button{margin-top:10px;background:#cc0000;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;width:100%}

/* EMPTY */
.empty{padding:40px 20px;text-align:center;color:#888;font-size:14px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-star">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#cc0000"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
    </div>
    <div>
      <div class="hdr-name">Dep. João Daniel · PT/SE</div>
      <div class="hdr-sub" id="hdr-sub">Carregando...</div>
    </div>
    <button class="hdr-refresh" onclick="loadData()" title="Atualizar">↺</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="busca" placeholder="Buscar município ou objeto…" oninput="onBusca()"/>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="loading">
  <div class="loading-spinner"></div>
  Conectando ao Google Sheets...
</div>
<div id="erro" class="erro" style="display:none">
  <div id="erro-msg"></div>
  <button onclick="loadData()">↺ Tentar novamente</button>
</div>

<!-- CONTEÚDO PRINCIPAL -->
<div id="conteudo" style="display:none">

  <!-- TOTAIS GERAIS -->
  <div class="totais">
    <div class="total-card">
      <div class="total-label">Total indicado</div>
      <div class="total-value" id="t-ind">—</div>
    </div>
    <div class="total-card">
      <div class="total-label">Total pago</div>
      <div class="total-value red" id="t-pago">—</div>
      <div class="exec-bar"><div class="exec-fill" id="t-bar" style="width:0%"></div></div>
      <div class="exec-pct" id="t-pct">0% executado</div>
    </div>
  </div>

  <!-- ABAS -->
  <div class="tabs">
    <button class="tab active" onclick="showAba('municipios',this)">Por Município</button>
    <button class="tab" onclick="showAba('resumo',this)">Resumo Geral</button>
  </div>

  <!-- ABA MUNICÍPIOS -->
  <div id="aba-municipios">
    <div class="section-title" id="sec-title">Municípios</div>
    <div class="mun-list" id="mun-list"></div>
  </div>

  <!-- ABA RESUMO -->
  <div id="aba-resumo" class="resumo">
    <div id="resumo-content"></div>
  </div>

  <!-- DETALHE MUNICÍPIO -->
  <div id="detalhe" class="detalhe">
    <button class="back-btn" onclick="voltarLista()">← Voltar</button>
    <div class="detalhe-nome" id="det-nome"></div>
    <div class="detalhe-totais" id="det-totais"></div>
    <div id="det-emendas"></div>
  </div>

</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyPzLZWMISk_jtybnA_-mDoIFeXTER2L8oh2QHt1lrnHaF3OFU4czZDqssOX_Nf5SRZTw/exec';
let D=[],abaAtual='municipios';

const N=v=>{
  if(v===null||v===undefined||v==='')return 0;
  if(typeof v==='number')return isNaN(v)?0:v;
  const s=String(v).trim().replace(/[R$\s]/g,'');
  if(/^\d{1,3}(\.\d{3})*(,\d+)?$/.test(s))return parseFloat(s.replace(/\./g,'').replace(',','.'))||0;
  if(/^\d{1,3}(,\d{3})*(\.\d+)?$/.test(s))return parseFloat(s.replace(/,/g,''))||0;
  return parseFloat(s.replace(',','.'))||0;
};

const FM=v=>{
  if(!v&&v!==0)return '—';
  if(v>=1e6)return 'R$ '+(v/1e6).toFixed(1).replace('.',',')+'M';
  if(v>=1e3)return 'R$ '+(v/1e3).toFixed(0)+'mil';
  return 'R$ '+Math.round(v).toLocaleString('pt-BR');
};

const FMF=v=>isNaN(v)||v===''?'—':'R$ '+Math.round(v).toLocaleString('pt-BR');

function sC(s){
  if(!s)return 's-gray';
  const l=s.toLowerCase();
  if(l.includes('conclu')||l.includes('pago')||l.includes('aprovad'))return 's-ok';
  if(l.includes('execu')||l.includes('anális')||l.includes('analise')||l.includes('aguardando')||l.includes('iniciada')||l.includes('comprov')||l.includes('empenhad')||l.includes('complement'))return 's-info';
  if(l.includes('anulado')||l.includes('rescindido')||l.includes('rejeit')||l.includes('cancelad'))return 's-err';
  return 's-warn';
}

function loadData(){
  document.getElementById('loading').style.display='block';
  document.getElementById('erro').style.display='none';
  document.getElementById('conteudo').style.display='none';
  document.getElementById('hdr-sub').textContent='Carregando...';

  const cbName='_cb_'+Date.now();
  const timeout=setTimeout(()=>{
    delete window[cbName];
    showErro('Tempo esgotado. Verifique sua conexão.');
  },15000);

  window[cbName]=function(rows){
    clearTimeout(timeout);delete window[cbName];
    try{
      D=rows.map(r=>({
        nemenda:String(r['Nº Emenda']||''),
        ano:String(r['Ano Emenda']||''),
        orgao:String(r['ORGÃO']||'').trim(),
        objeto:String(r['Objeto']||''),
        proponente:String(r['Proponente']||''),
        municipio:String(r['Município']||'').trim(),
        situacao:String(r['Situação']||''),
        tipo:String(r['Tipo Emenda']||''),
        link:String(r['Link']||''),
        indicado:N(r['Indicado']),
        empenhado:N(r['Empenhado']),
        pago:N(r['Pago']),
      })).filter(r=>r.municipio);

      document.getElementById('loading').style.display='none';
      document.getElementById('conteudo').style.display='block';
      const now=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('hdr-sub').textContent=D.length+' emendas · atualizado '+now;
      renderTotais(D);
      renderMunicipios(D);
      renderResumo();
    }catch(e){showErro('Erro: '+e.message);}
  };

  const s=document.createElement('script');
  s.src=SCRIPT_URL+'?callback='+cbName;
  s.onerror=()=>{clearTimeout(timeout);delete window[cbName];showErro('Erro de conexão.');};
  document.head.appendChild(s);
}

function showErro(msg){
  document.getElementById('loading').style.display='none';
  document.getElementById('conteudo').style.display='none';
  document.getElementById('erro').style.display='block';
  document.getElementById('erro-msg').textContent=msg;
}

function renderTotais(data){
  const tI=data.reduce((s,r)=>s+r.indicado,0);
  const tP=data.reduce((s,r)=>s+r.pago,0);
  const pct=tI>0?Math.min(100,Math.round(tP/tI*100)):0;
  document.getElementById('t-ind').textContent=FMF(tI);
  document.getElementById('t-pago').textContent=FMF(tP);
  document.getElementById('t-bar').style.width=pct+'%';
  document.getElementById('t-pct').textContent=pct+'% executado';
}

function renderMunicipios(data){
  const map={};
  data.forEach(r=>{
    const k=r.municipio;
    if(!map[k])map[k]={nome:k,qtd:0,ind:0,pago:0};
    map[k].qtd++;map[k].ind+=r.indicado;map[k].pago+=r.pago;
  });
  const list=Object.values(map).sort((a,b)=>b.ind-a.ind);
  const q=document.getElementById('busca').value.toLowerCase();
  const filtrado=q?list.filter(m=>m.nome.toLowerCase().includes(q)):list;

  document.getElementById('sec-title').textContent=
    filtrado.length+' município'+(filtrado.length!==1?'s':'')+(q?' encontrado'+(filtrado.length!==1?'s':''):'');

  if(!filtrado.length){
    document.getElementById('mun-list').innerHTML='<div class="empty">Nenhum município encontrado.</div>';
    return;
  }

  document.getElementById('mun-list').innerHTML=filtrado.map(m=>{
    const pct=m.ind>0?Math.min(100,Math.round(m.pago/m.ind*100)):0;
    return`<div class="mun-card" onclick="verMunicipio('${m.nome.replace(/'/g,"\\'")}')">
      <div class="mun-header">
        <div>
          <div class="mun-nome">${m.nome}</div>
          <div class="mun-qtd">${m.qtd} emenda${m.qtd!==1?'s':''}</div>
        </div>
        <div class="mun-chevron">›</div>
      </div>
      <div class="mun-valores">
        <div class="mun-val">
          <div class="mun-val-label">Indicado</div>
          <div class="mun-val-num">${FM(m.ind)}</div>
        </div>
        <div class="mun-val">
          <div class="mun-val-label">Pago</div>
          <div class="mun-val-num red">${FM(m.pago)}</div>
        </div>
      </div>
      <div class="mun-bar"><div class="mun-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function verMunicipio(nome){
  const rows=D.filter(r=>r.municipio===nome);
  const tI=rows.reduce((s,r)=>s+r.indicado,0);
  const tE=rows.reduce((s,r)=>s+r.empenhado,0);
  const tP=rows.reduce((s,r)=>s+r.pago,0);
  const pct=tI>0?Math.min(100,Math.round(tP/tI*100)):0;

  document.getElementById('det-nome').textContent=nome;
  document.getElementById('det-totais').innerHTML=`
    <div class="dt"><div class="dt-label">Emendas</div><div class="dt-value">${rows.length}</div></div>
    <div class="dt"><div class="dt-label">Indicado</div><div class="dt-value" style="font-size:12px">${FM(tI)}</div></div>
    <div class="dt"><div class="dt-label">Pago · ${pct}%</div><div class="dt-value red" style="font-size:12px">${FM(tP)}</div></div>
  `;

  document.getElementById('det-emendas').innerHTML=rows.map(r=>`
    <div class="emenda-item">
      <div class="emenda-objeto">${r.objeto||'—'}</div>
      <div class="emenda-row">
        <span class="emenda-label">Indicado</span>
        <span class="emenda-val">${FMF(r.indicado)}</span>
      </div>
      <div class="emenda-row">
        <span class="emenda-label">Pago</span>
        <span class="emenda-val red">${FMF(r.pago)}</span>
      </div>
      <div class="emenda-row">
        <span class="emenda-label">Órgão · ${r.ano}</span>
        <span class="emenda-val">${r.orgao}</span>
      </div>
      <div class="emenda-sit"><span class="pill ${sC(r.situacao)}">${r.situacao||'—'}</span></div>
    </div>
  `).join('');

  // Esconde lista, mostra detalhe
  document.getElementById('aba-municipios').style.display='none';
  document.getElementById('aba-resumo').style.display='none';
  document.getElementById('detalhe').style.display='block';
  window.scrollTo(0,0);
}

function voltarLista(){
  document.getElementById('detalhe').style.display='none';
  if(abaAtual==='municipios'){
    document.getElementById('aba-municipios').style.display='block';
  } else {
    document.getElementById('aba-resumo').style.display='block';
  }
  window.scrollTo(0,0);
}

function renderResumo(){
  const porOrgao={};
  const porTipo={};
  const porAno={};
  D.forEach(r=>{
    const o=r.orgao||'Outros';
    if(!porOrgao[o])porOrgao[o]={ind:0,pago:0};
    porOrgao[o].ind+=r.indicado;porOrgao[o].pago+=r.pago;
    const t=r.tipo||'Outros';
    if(!porTipo[t])porTipo[t]={ind:0,qtd:0};
    porTipo[t].ind+=r.indicado;porTipo[t].qtd++;
    const a=r.ano||'—';
    if(!porAno[a])porAno[a]={ind:0,pago:0,qtd:0};
    porAno[a].ind+=r.indicado;porAno[a].pago+=r.pago;porAno[a].qtd++;
  });

  const tI=D.reduce((s,r)=>s+r.indicado,0);
  const tP=D.reduce((s,r)=>s+r.pago,0);
  const pct=tI>0?Math.min(100,Math.round(tP/tI*100)):0;
  const muns=new Set(D.map(r=>r.municipio)).size;

  const top5orgao=Object.entries(porOrgao).sort((a,b)=>b[1].ind-a[1].ind).slice(0,5);
  const anosOrd=Object.entries(porAno).sort((a,b)=>a[0].localeCompare(b[0]));
  const tiposOrd=Object.entries(porTipo).sort((a,b)=>b[1].ind-a[1].ind);

  document.getElementById('resumo-content').innerHTML=`
    <div style="height:12px"></div>
    <div class="resumo-card">
      <div class="resumo-titulo">Visão Geral</div>
      <div class="resumo-item"><span class="resumo-item-nome">Total de emendas</span><span class="resumo-item-val">${D.length}</span></div>
      <div class="resumo-item"><span class="resumo-item-nome">Municípios atendidos</span><span class="resumo-item-val">${muns}</span></div>
      <div class="resumo-item"><span class="resumo-item-nome">Total indicado</span><span class="resumo-item-val">${FMF(tI)}</span></div>
      <div class="resumo-item"><span class="resumo-item-nome">Total pago</span><span class="resumo-item-val">${FMF(tP)}</span></div>
      <div class="resumo-item"><span class="resumo-item-nome">% executado</span><span class="resumo-item-val">${pct}%</span></div>
    </div>
    <div class="resumo-card">
      <div class="resumo-titulo">Top 5 órgãos por valor</div>
      ${top5orgao.map(([org,v])=>`
        <div class="resumo-item">
          <span class="resumo-item-nome">${org}</span>
          <span class="resumo-item-val">${FM(v.ind)}</span>
        </div>`).join('')}
    </div>
    <div class="resumo-card">
      <div class="resumo-titulo">Por tipo de emenda</div>
      ${tiposOrd.map(([tipo,v])=>`
        <div class="resumo-item">
          <span class="resumo-item-nome">${tipo} <span style="color:#888;font-size:11px">(${v.qtd})</span></span>
          <span class="resumo-item-val">${FM(v.ind)}</span>
        </div>`).join('')}
    </div>
    <div class="resumo-card">
      <div class="resumo-titulo">Por ano</div>
      ${anosOrd.map(([ano,v])=>`
        <div class="resumo-item">
          <span class="resumo-item-nome">${ano} <span style="color:#888;font-size:11px">(${v.qtd} emendas)</span></span>
          <span class="resumo-item-val">${FM(v.ind)}</span>
        </div>`).join('')}
    </div>
  `;
}

function showAba(aba,btn){
  abaAtual=aba;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('aba-municipios').style.display=aba==='municipios'?'block':'none';
  document.getElementById('aba-resumo').style.display=aba==='resumo'?'block':'none';
  document.getElementById('detalhe').style.display='none';
}

function onBusca(){
  const q=document.getElementById('busca').value.toLowerCase();
  if(abaAtual==='municipios'){
    renderMunicipios(D);
  }
}

loadData();
</script>
</body>
</html>
